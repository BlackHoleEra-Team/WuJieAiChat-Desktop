<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>浏览器</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: #f5f5f5;
      overflow: hidden;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* 自定义标题栏 */
    .title-bar {
      height: 40px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 12px;
      -webkit-app-region: drag;
      user-select: none;
    }

    .title-bar-left {
      display: flex;
      align-items: center;
      gap: 10px;
      flex: 1;
      min-width: 0;
    }

    .site-icon {
      width: 16px;
      height: 16px;
      border-radius: 3px;
      object-fit: contain;
      background: white;
      padding: 1px;
    }

    .site-icon.hidden {
      display: none;
    }

    .window-title {
      color: white;
      font-size: 13px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* 下载进度显示 */
    .download-info {
      display: flex;
      align-items: center;
      gap: 8px;
      color: white;
      font-size: 12px;
      background: rgba(0, 0, 0, 0.2);
      padding: 4px 10px;
      border-radius: 12px;
      margin-right: 8px;
      -webkit-app-region: no-drag;
    }

    .download-info.hidden {
      display: none;
    }

    .download-icon {
      width: 14px;
      height: 14px;
      fill: white;
    }

    .download-text {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 200px;
    }

    .download-progress {
      font-weight: 600;
      color: #4caf50;
    }

    /* 下载面板（内嵌在标题栏和 BrowserView 之间） */
    .download-panel {
      background: #2d2d3a;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      display: none;
      flex-direction: column;
      max-height: 300px;
      overflow: hidden;
    }

    .download-panel.show {
      display: flex;
    }

    .download-panel.has-items {
      max-height: none;
    }

    .download-panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .download-panel-title {
      color: white;
      font-size: 14px;
      font-weight: 600;
    }

    .download-panel-actions {
      display: flex;
      gap: 8px;
    }

    .download-panel-btn {
      width: 28px;
      height: 28px;
      border: none;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s ease;
    }

    .download-panel-btn:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    .download-panel-btn svg {
      width: 16px;
      height: 16px;
      fill: white;
    }

    .download-panel-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
      max-height: 250px;
    }

    .download-panel-list::-webkit-scrollbar {
      width: 6px;
    }

    .download-panel-list::-webkit-scrollbar-track {
      background: transparent;
    }

    .download-panel-list::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.2);
      border-radius: 3px;
    }

    .download-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 12px;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s ease;
      margin-bottom: 4px;
    }

    .download-item:hover {
      background: rgba(255, 255, 255, 0.05);
    }

    .download-item-icon {
      width: 36px;
      height: 36px;
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .download-item-icon svg {
      width: 20px;
      height: 20px;
      fill: #667eea;
    }

    .download-item-info {
      flex: 1;
      min-width: 0;
    }

    .download-item-name {
      color: white;
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 2px;
    }

    .download-item-status {
      color: rgba(255, 255, 255, 0.5);
      font-size: 11px;
    }

    .download-item-status.completed {
      color: #4caf50;
    }

    .download-item-status.error {
      color: #f44336;
    }

    .download-item-status.cancelled {
      color: #ff9800;
    }

    .download-item-progress {
      width: 50px;
      text-align: right;
    }

    .download-item-progress-bar {
      height: 3px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 2px;
    }

    .download-item-progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #667eea, #764ba2);
      border-radius: 2px;
      transition: width 0.3s ease;
    }

    .download-item-progress-text {
      color: rgba(255, 255, 255, 0.6);
      font-size: 10px;
    }

    .download-item-cancel {
      width: 24px;
      height: 24px;
      border: none;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 4px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s ease;
      flex-shrink: 0;
    }

    .download-item-cancel:hover {
      background: rgba(244, 67, 54, 0.3);
    }

    .download-item-cancel svg {
      width: 14px;
      height: 14px;
      fill: white;
    }

    .download-panel-empty {
      text-align: center;
      padding: 30px 20px;
      color: rgba(255, 255, 255, 0.4);
      font-size: 13px;
    }

    .title-bar-right {
      display: flex;
      align-items: center;
      gap: 8px;
      -webkit-app-region: no-drag;
    }

    .title-btn {
      width: 28px;
      height: 28px;
      border: none;
      background: rgba(255, 255, 255, 0.15);
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
    }

    .title-btn:hover {
      background: rgba(255, 255, 255, 0.25);
    }

    .title-btn svg {
      width: 14px;
      height: 14px;
      fill: white;
    }

    .title-btn.external:hover {
      background: rgba(76, 175, 80, 0.3);
    }

    .title-btn.close:hover {
      background: rgba(244, 67, 54, 0.3);
    }

    /* 标签栏 */
    .tab-bar {
      height: 36px;
      background: #2d2d3a;
      display: flex;
      align-items: center;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      overflow-x: auto;
      overflow-y: hidden;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }

    .tab-bar::-webkit-scrollbar {
      display: none;
    }

    .tab {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 12px;
      height: 32px;
      min-width: 120px;
      max-width: 200px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 8px 8px 0 0;
      margin-right: 2px;
      cursor: pointer;
      transition: background 0.2s ease;
      position: relative;
      flex-shrink: 0;
    }

    .tab:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    .tab.active {
      background: rgba(255, 255, 255, 0.15);
    }

    .tab-favicon {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
      object-fit: contain;
    }

    .tab-title {
      flex: 1;
      color: rgba(255, 255, 255, 0.8);
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .tab-close {
      width: 16px;
      height: 16px;
      border: none;
      background: transparent;
      border-radius: 4px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.2s ease, background 0.2s ease;
      flex-shrink: 0;
    }

    .tab:hover .tab-close,
    .tab.active .tab-close {
      opacity: 1;
    }

    .tab-close:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    .tab-close svg {
      width: 12px;
      height: 12px;
      fill: rgba(255, 255, 255, 0.6);
    }

    .tab-loading {
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255, 255, 255, 0.2);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* 加载进度条 */
    .progress-bar {
      height: 2px;
      background: #e0e0e0;
      position: relative;
      overflow: hidden;
    }

    .progress-bar.active::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      height: 100%;
      width: 30%;
      background: linear-gradient(90deg, #667eea, #764ba2);
      animation: loading 1s ease-in-out infinite;
    }

    @keyframes loading {
      0% { left: -30%; }
      100% { left: 100%; }
    }

    /* BrowserView 占位区域 */
    .browser-view-container {
      flex: 1;
      background: white;
    }
  </style>
</head>
<body>
  <!-- 标题栏 -->
  <div class="title-bar">
    <div class="title-bar-left">
      <img class="site-icon hidden" id="siteIcon" src="" alt="">
      <span class="window-title" id="window-title">浏览器</span>
    </div>
    <!-- 下载信息 -->
    <div class="download-info hidden" id="downloadInfo">
      <svg class="download-icon" viewBox="0 0 24 24">
        <path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/>
      </svg>
      <span class="download-text" id="downloadText">下载中...</span>
      <span class="download-progress" id="downloadProgress">0%</span>
    </div>
    <div class="title-bar-right">
      <button class="title-btn external" id="externalBtn" title="在默认浏览器中打开">
        <svg viewBox="0 0 24 24">
          <path d="M19 19H5V5h7V3H5c-1.11 0-2 .9-2 2v14c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2v-7h-2v7zM14 3v2h3.59l-9.83 9.83 1.41 1.41L19 6.41V10h2V3h-7z"/>
        </svg>
      </button>
      <button class="title-btn minimize" id="minimizeBtn" title="最小化">
        <svg viewBox="0 0 24 24">
          <path d="M19 13H5v-2h14v2z"/>
        </svg>
      </button>
      <button class="title-btn maximize" id="maximizeBtn" title="最大化">
        <svg viewBox="0 0 24 24">
          <path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/>
        </svg>
      </button>
      <button class="title-btn close" id="closeBtn" title="关闭">
        <svg viewBox="0 0 24 24">
          <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- 标签栏 -->
  <div class="tab-bar" id="tabBar"></div>

  <!-- 进度条 -->
  <div class="progress-bar" id="progressBar"></div>

  <!-- 下载管理器（内嵌在标题栏下方） -->
  <div class="download-panel" id="downloadPanel">
    <div class="download-panel-header">
      <span class="download-panel-title">下载</span>
      <div class="download-panel-actions">
        <button class="download-panel-btn" id="openDownloadFolderBtn" title="打开下载文件夹">
          <svg viewBox="0 0 24 24">
            <path d="M20 6h-8l-2-2H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm0 12H4V8h16v10z"/>
          </svg>
        </button>
        <button class="download-panel-btn" id="closeDownloadPanelBtn" title="关闭">
          <svg viewBox="0 0 24 24">
            <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
          </svg>
        </button>
      </div>
    </div>
    <div class="download-panel-list" id="downloadPanelList">
      <div class="download-panel-empty">暂无下载记录</div>
    </div>
  </div>

  <!-- BrowserView 容器（BrowserView 会被嵌入到这里） -->
  <div class="browser-view-container" id="browserViewContainer"></div>

  <script>
    const { ipcRenderer, shell } = require('electron')

    // DOM 元素
    const windowTitle = document.getElementById('window-title')
    const siteIcon = document.getElementById('siteIcon')
    const progressBar = document.getElementById('progressBar')
    const downloadInfo = document.getElementById('downloadInfo')
    const downloadText = document.getElementById('downloadText')
    const downloadProgress = document.getElementById('downloadProgress')
    const downloadPanel = document.getElementById('downloadPanel')
    const downloadPanelList = document.getElementById('downloadPanelList')
    const tabBar = document.getElementById('tabBar')

    let currentUrl = ''
    let downloadTimeout = null
    let downloads = [] // 存储所有下载项
    let tabs = [] // 存储所有标签页
    let activeTabId = null // 当前活动标签页ID

    // 格式化文件大小
    function formatBytes(bytes) {
      if (bytes === 0) return '0 B'
      const k = 1024
      const sizes = ['B', 'KB', 'MB', 'GB']
      const i = Math.floor(Math.log(bytes) / Math.log(k))
      return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i]
    }

    // 获取文件图标（根据扩展名）
    function getFileIcon(fileName) {
      const ext = fileName.split('.').pop().toLowerCase()
      const icons = {
        pdf: '<svg viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/></svg>',
        zip: '<svg viewBox="0 0 24 24"><path d="M20 6h-8l-2-2H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm-2 12H6v-2h12v2zm0-4H6v-2h12v2zm-2-4H6V8h10v2z"/></svg>',
        exe: '<svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg>',
        doc: '<svg viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/></svg>',
        default: '<svg viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/></svg>'
      }
      return icons[ext] || icons.default
    }

    // 更新下载列表显示
    function updateDownloadList() {
      // 根据下载项数量动态调整面板高度
      if (downloads.length === 0) {
        downloadPanelList.innerHTML = '<div class="download-panel-empty">暂无下载记录</div>'
        downloadPanel.classList.remove('has-items')
      } else {
        downloadPanel.classList.add('has-items')
      }

      if (downloads.length === 0) return

      downloadPanelList.innerHTML = downloads.map((item, index) => {
        const isCompleted = item.state === 'completed'
        const isCancelled = item.state === 'cancelled'
        const isError = item.state === 'interrupted'
        const isProgressing = !isCompleted && !isCancelled && !isError
        const progress = item.totalBytes > 0 ? (item.receivedBytes / item.totalBytes * 100) : 0
        
        // 计算下载速度
        let speedText = ''
        if (isProgressing && item.speed > 0) {
          speedText = `${formatBytes(item.speed)}/s`
        }
        
        let statusText = '下载中...'
        let statusClass = ''
        if (isCompleted) {
          statusText = '已完成'
          statusClass = 'completed'
        } else if (isCancelled) {
          statusText = '已取消'
          statusClass = 'cancelled'
        } else if (isError) {
          statusText = '下载失败'
          statusClass = 'error'
        } else {
          statusText = `${formatBytes(item.receivedBytes)} / ${formatBytes(item.totalBytes)}${speedText ? ' · ' + speedText : ''}`
        }

        return `
          <div class="download-item" data-index="${index}" data-id="${item.downloadId}" title="${item.savePath || ''}">
            <div class="download-item-icon">
              ${getFileIcon(item.fileName)}
            </div>
            <div class="download-item-info">
              <div class="download-item-name">${item.fileName}</div>
              <div class="download-item-status ${statusClass}">${statusText}</div>
            </div>
            ${isProgressing ? `
              <div class="download-item-progress">
                <div class="download-item-progress-bar">
                  <div class="download-item-progress-fill" style="width: ${progress}%"></div>
                </div>
                <div class="download-item-progress-text">${progress.toFixed(0)}%</div>
              </div>
              <button class="download-item-cancel" data-id="${item.downloadId}" title="取消下载">
                <svg viewBox="0 0 24 24">
                  <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
                </svg>
              </button>
            ` : ''}
          </div>
        `
      }).join('')

      // 添加点击事件（打开文件所在文件夹）
      document.querySelectorAll('.download-item').forEach(item => {
        item.addEventListener('click', (e) => {
          // 如果点击的是取消按钮，不执行打开文件夹
          if (e.target.closest('.download-item-cancel')) return
          
          const index = parseInt(item.dataset.index)
          const download = downloads[index]
          if (download && download.savePath) {
            shell.showItemInFolder(download.savePath)
          }
        })
      })

      // 添加取消下载按钮事件
      document.querySelectorAll('.download-item-cancel').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation()
          const downloadId = btn.dataset.id
          console.log('取消下载:', downloadId)
          ipcRenderer.send('cancel-download', downloadId)
        })
      })
    }

    // 显示/隐藏下载面板
    function toggleDownloadPanel() {
      const isVisible = !downloadPanel.classList.contains('show')
      downloadPanel.classList.toggle('show')
      // 通知主进程调整 BrowserView 大小，传入下载项数量
      ipcRenderer.send('download-panel-toggled', isVisible, downloads.length)
    }

    // 点击下载信息打开下载面板
    downloadInfo.addEventListener('click', toggleDownloadPanel)

    // 监听标题变化
    ipcRenderer.on('page-title-updated', (event, title) => {
      console.log('Title updated:', title)
      if (title && title !== '浏览器') {
        windowTitle.textContent = title
      }
    })

    // 监听 favicon 变化
    ipcRenderer.on('page-favicon-updated', (event, faviconUrl) => {
      console.log('Favicon updated:', faviconUrl)
      if (faviconUrl) {
        siteIcon.src = faviconUrl
        siteIcon.classList.remove('hidden')
        siteIcon.onerror = () => {
          siteIcon.classList.add('hidden')
        }
      }
    })

    // 监听加载开始
    ipcRenderer.on('loading-started', () => {
      progressBar.classList.add('active')
    })

    // 监听加载停止
    ipcRenderer.on('loading-stopped', () => {
      progressBar.classList.remove('active')
    })

    // 监听导航（获取当前 URL）
    ipcRenderer.on('did-navigate', (event, url) => {
      console.log('Navigated to:', url)
      currentUrl = url
    })

    // ============ 标签页功能 ============

    // 更新标签页显示
    function updateTabs() {
      if (tabs.length === 0) {
        tabBar.innerHTML = ''
        return
      }

      tabBar.innerHTML = tabs.map(tab => {
        const isActive = tab.tabId === activeTabId
        const faviconHtml = tab.favicon
          ? `<img src="${tab.favicon}" class="tab-favicon" onerror="this.style.display='none'">`
          : `<div class="tab-favicon" style="background: rgba(255,255,255,0.2); border-radius: 3px;"></div>`

        const loadingHtml = tab.isLoading
          ? `<div class="tab-loading"></div>`
          : faviconHtml

        return `
          <div class="tab ${isActive ? 'active' : ''}" data-tab-id="${tab.tabId}">
            ${loadingHtml}
            <span class="tab-title">${tab.title || '加载中...'}</span>
            <button class="tab-close" data-tab-id="${tab.tabId}" title="关闭标签页">
              <svg viewBox="0 0 24 24">
                <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
              </svg>
            </button>
          </div>
        `
      }).join('')

      // 绑定标签页点击事件
      document.querySelectorAll('.tab').forEach(tabEl => {
        tabEl.addEventListener('click', (e) => {
          // 如果点击的是关闭按钮，不触发切换
          if (e.target.closest('.tab-close')) return

          const tabId = tabEl.dataset.tabId
          if (tabId !== activeTabId) {
            ipcRenderer.send('switch-tab', tabId)
          }
        })
      })

      // 绑定关闭按钮事件
      document.querySelectorAll('.tab-close').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation()
          const tabId = btn.dataset.tabId
          ipcRenderer.send('close-tab', tabId)
        })
      })
    }

    // 监听标签页列表更新
    ipcRenderer.on('tabs-updated', (event, data) => {
      console.log('标签页更新:', data)
      tabs = data.tabs
      activeTabId = data.activeTabId
      updateTabs()
    })

    // 监听标签页标题更新
    ipcRenderer.on('tab-title-updated', (event, data) => {
      const tab = tabs.find(t => t.tabId === data.tabId)
      if (tab) {
        tab.title = data.title
        updateTabs()
      }
    })

    // 监听标签页 favicon 更新
    ipcRenderer.on('tab-favicon-updated', (event, data) => {
      const tab = tabs.find(t => t.tabId === data.tabId)
      if (tab) {
        tab.favicon = data.favicon
        updateTabs()
      }
    })

    // 监听标签页切换
    ipcRenderer.on('tab-switched', (event, data) => {
      console.log('切换到标签页:', data)
      activeTabId = data.tabId

      // 更新标题栏
      if (data.title && data.title !== '浏览器') {
        windowTitle.textContent = data.title
      }

      // 更新 favicon
      if (data.favicon) {
        siteIcon.src = data.favicon
        siteIcon.classList.remove('hidden')
      } else {
        siteIcon.classList.add('hidden')
      }

      // 更新加载状态
      if (data.isLoading) {
        progressBar.classList.add('active')
      } else {
        progressBar.classList.remove('active')
      }

      updateTabs()
    })

    // 监听下载开始
    ipcRenderer.on('download-started', (event, data) => {
      console.log('下载开始:', data.fileName, 'ID:', data.downloadId)
      downloadInfo.classList.remove('hidden')
      downloadText.textContent = data.fileName
      downloadProgress.textContent = '0%'
      
      // 添加到下载列表
      downloads.unshift({
        downloadId: data.downloadId,
        fileName: data.fileName,
        totalBytes: data.totalBytes,
        receivedBytes: 0,
        state: 'progressing',
        savePath: null
      })
      updateDownloadList()
      
      // 清除之前的超时
      if (downloadTimeout) {
        clearTimeout(downloadTimeout)
      }
    })

    // 监听下载进度
    ipcRenderer.on('download-progress', (event, data) => {
      const progress = data.progress
      const received = formatBytes(data.receivedBytes)
      const total = formatBytes(data.totalBytes)
      
      downloadProgress.textContent = progress + '%'
      
      // 如果知道总大小，显示更详细的信息
      if (data.totalBytes > 0) {
        downloadText.textContent = `${data.fileName} (${received}/${total})`
      } else {
        downloadText.textContent = `${data.fileName} (${received})`
      }
      
      // 更新下载列表
      const download = downloads.find(d => d.downloadId === data.downloadId && d.state === 'progressing')
      if (download) {
        download.receivedBytes = data.receivedBytes
        download.totalBytes = data.totalBytes
        download.speed = data.speed || 0
        updateDownloadList()
      }
    })

    // 监听下载完成
    ipcRenderer.on('download-completed', (event, data) => {
      console.log('下载完成:', data.fileName, '状态:', data.state)
      
      // 更新下载列表
      const download = downloads.find(d => d.downloadId === data.downloadId)
      if (download) {
        download.state = data.state
        download.savePath = data.savePath
        updateDownloadList()
      }
      
      if (data.state === 'completed') {
        downloadProgress.textContent = '完成'
        downloadProgress.style.color = '#4caf50'
        downloadText.textContent = data.fileName
      } else if (data.state === 'cancelled') {
        downloadProgress.textContent = '已取消'
        downloadProgress.style.color = '#ff9800'
      } else {
        downloadProgress.textContent = '失败'
        downloadProgress.style.color = '#f44336'
      }
      
      // 3秒后隐藏下载信息
      downloadTimeout = setTimeout(() => {
        downloadInfo.classList.add('hidden')
        downloadProgress.style.color = '#4caf50'
      }, 3000)
    })

    // 标题栏按钮
    document.getElementById('minimizeBtn').addEventListener('click', () => {
      ipcRenderer.send('minimize-browser-window')
    })

    document.getElementById('maximizeBtn').addEventListener('click', () => {
      ipcRenderer.send('maximize-browser-window')
    })

    document.getElementById('closeBtn').addEventListener('click', () => {
      ipcRenderer.send('close-browser-window')
    })

    // 在默认浏览器中打开
    document.getElementById('externalBtn').addEventListener('click', () => {
      if (currentUrl) {
        shell.openExternal(currentUrl)
      }
    })

    // 下载面板按钮
    document.getElementById('closeDownloadPanelBtn').addEventListener('click', () => {
      downloadPanel.classList.remove('show')
      // 通知主进程调整 BrowserView 大小
      ipcRenderer.send('download-panel-toggled', false)
    })

    document.getElementById('openDownloadFolderBtn').addEventListener('click', () => {
      ipcRenderer.send('open-downloads-folder')
    })
  </script>
</body>
</html>
