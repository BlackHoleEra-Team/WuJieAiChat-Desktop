<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>毛玻璃聊天输入框</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        /* 背景容器 - 保留深色渐变背景 */
        .app-container {
            width: 100%;
            height: 100vh;
            background: linear-gradient(135deg, #2a2a38 0%, #1f1f2b 100%);
            background-image: url("data:image/svg+xml,%3Csvg width='100%25' height='100%25' xmlns='http://www.w3.org/2000/svg'%3E%3Cdefs%3E%3ClinearGradient id='grad1' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' style='stop-color:rgba(120,80,180,0.1);stop-opacity:1'/%3E%3Cstop offset='100%25' style='stop-color:rgba(70,40,120,0.05);stop-opacity:1'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='100%25' height='100%25' fill='url(%23grad1)'/%3E%3C/svg%3E");
            position: relative;
            overflow: hidden;
        }

        /* 核心：一体化毛玻璃输入框容器 */
        .chat-input-wrapper {
            position: absolute;
            bottom: 20px;
            left: 20px;
            right: 20px;
            min-height: 70px;
            max-height: 150px;
            background: rgba(40, 40, 55, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 12px;
            border: 1px solid rgba(80, 80, 100, 0.3);
            display: flex;
            align-items: center;
            padding: 12px 15px;
            gap: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
            z-index: 10;
            transition: height 0.2s ease;
        }

        /* 毛玻璃输入框主体 */
        .input-area {
            flex: 1;
            min-height: 45px;
            max-height: 120px;
            background: transparent;
            border: none;
            outline: none;
            color: rgba(240, 240, 250, 0.9);
            font-size: 14px;
            line-height: 1.5;
            padding: 8px 10px;
            resize: none;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: rgba(100, 100, 120, 0.5) transparent;
        }
        /* 自定义滚动条 */
        .input-area::-webkit-scrollbar {
            width: 4px;
        }
        .input-area::-webkit-scrollbar-track {
            background: transparent;
        }
        .input-area::-webkit-scrollbar-thumb {
            background-color: rgba(100, 100, 120, 0.5);
            border-radius: 2px;
        }
        .input-area::placeholder {
            color: rgba(180, 180, 200, 0.6);
        }

        /* 发送按钮 */
        .send-btn {
            min-width: 80px;
            height: 45px;
            background: rgba(145, 90, 220, 0.7);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 8px;
            border: 1px solid rgba(160, 100, 230, 0.3);
            color: #fff;
            font-size: 14px;
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            cursor: pointer;
            transition: background 0.2s;
            flex-shrink: 0;
        }
        .send-btn:hover {
            background: rgba(145, 90, 220, 0.9);
        }
        .send-arrow {
            font-size: 12px;
        }

        /* 适配小屏 */
        @media (max-width: 768px) {
            .chat-input-wrapper {
                min-height: 60px;
                max-height: 120px;
                padding: 8px 10px;
            }
            .send-btn {
                min-width: 70px;
                height: 40px;
            }
            .input-area {
                min-height: 40px;
                max-height: 100px;
            }
        }
    </style>
    <!-- 图标库 -->
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <!-- 仅保留输入框容器 -->
        <div class="chat-input-wrapper">
            <!-- 输入框主体 -->
            <textarea class="input-area" placeholder="请输入消息..."></textarea>

            <!-- 发送按钮 -->
            <div class="send-btn">
                <span>发送</span>
                <span class="send-arrow"><i class="fas fa-chevron-down"></i></span>
            </div>
        </div>
    </div>

    <script>
        // 发送按钮交互
        const sendBtn = document.querySelector('.send-btn');
        const inputArea = document.querySelector('.input-area');
        const inputWrapper = document.querySelector('.chat-input-wrapper');
        
        sendBtn.addEventListener('click', () => {
            const content = inputArea.value.trim();
            if (content) {
                console.log('发送消息：', content);
                inputArea.value = '';
                resetInputHeight();
            } else {
                alert('请输入消息内容！');
            }
        });

        // 回车发送（shift+回车换行）
        inputArea.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendBtn.click();
            }
            if (e.key === 'Enter' && e.shiftKey) {
                setTimeout(adjustInputHeight, 0);
            }
        });

        // 重置输入框高度
        function resetInputHeight() {
            inputArea.style.height = 'auto';
            inputArea.style.height = `${Math.min(inputArea.scrollHeight, 45)}px`;
            inputWrapper.style.height = 'auto';
            inputWrapper.style.minHeight = '70px';
        }

        // 自适应调整输入框高度
        function adjustInputHeight() {
            inputArea.style.height = 'auto';
            const newHeight = Math.min(inputArea.scrollHeight, 120);
            inputArea.style.height = `${newHeight}px`;
            inputWrapper.style.minHeight = `${newHeight + 24}px`;
        }

        // 输入框内容变化时自适应高度
        inputArea.addEventListener('input', adjustInputHeight);

        // 初始化输入框高度
        resetInputHeight();
    </script>
</body>
</html>
