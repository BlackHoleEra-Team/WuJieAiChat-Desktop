<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>聊天记录管理</title>
  <link rel="stylesheet" href="./css/chat-history.css">
</head>
<body>
  <div class="window-container">
    <!-- 标题栏 -->
    <div class="title-bar">
      <div class="title-bar-content">
        <div class="title-section">
          <svg class="title-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="16" y1="13" x2="8" y2="13"/>
            <line x1="16" y1="17" x2="8" y2="17"/>
            <polyline points="10 9 9 9 8 9"/>
          </svg>
          <span class="title-text">聊天记录管理</span>
        </div>
        <div class="window-controls">
          <button class="window-btn minimize" id="minimizeBtn" title="最小化">
            <svg width="12" height="12" viewBox="0 0 12 12">
              <rect x="1" y="6" width="10" height="1" fill="currentColor"/>
            </svg>
          </button>
          <button class="window-btn close" id="closeBtn" title="关闭">
            <svg width="12" height="12" viewBox="0 0 12 12">
              <path d="M1 1l10 10M11 1L1 11" stroke="currentColor" stroke-width="1.5"/>
            </svg>
          </button>
        </div>
      </div>
    </div>

    <!-- 主内容区 -->
    <div class="main-content">
      <!-- 联系人信息头部 -->
      <div class="contact-header">
        <div class="contact-avatar">
          <img src="images/app-icon.png" alt="联系人头像" id="contact-avatar-img">
        </div>
        <div class="contact-info">
          <h2 class="contact-name" id="contact-name">--</h2>
          <p class="contact-stats">
            共 <span class="stats-number" id="total-messages">0</span> 条消息
          </p>
        </div>
      </div>

      <!-- 操作按钮区 -->
      <div class="action-bar">
        <button class="action-btn secondary" id="select-mode-btn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
            <line x1="9" y1="9" x2="15" y2="9"/>
            <line x1="9" y1="15" x2="15" y2="15"/>
          </svg>
          <span>选择模式</span>
        </button>
        <button class="action-btn secondary" id="add-to-memory-btn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 5v14M5 12h14"/>
          </svg>
          <span>加入长期记忆</span>
        </button>
        <button class="action-btn secondary" id="view-memory-btn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 2L2 7l10 5 10-5-10-5z"/>
            <path d="M2 17l10 5 10-5"/>
            <path d="M2 12l10 5 10-5"/>
          </svg>
          <span>查看长期记忆</span>
        </button>
        <button class="action-btn danger" id="clear-history-btn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 6h18"/>
            <path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/>
            <path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/>
          </svg>
          <span>清空记录</span>
        </button>
        <button class="action-btn primary" id="export-history-btn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="7 10 12 15 17 10"/>
            <line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
          <span>导出记录</span>
        </button>
      </div>

      <!-- 搜索区域 -->
      <div class="search-container">
        <div class="search-box">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/>
            <path d="M21 21l-4.35-4.35"/>
          </svg>
          <input type="text" id="search-input" placeholder="搜索聊天记录..." autocomplete="off">
          <button class="search-clear" id="search-clear" style="display: none;">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M18 6L6 18M6 6l12 12"/>
            </svg>
          </button>
        </div>
        <div class="search-stats" id="search-stats"></div>
      </div>

      <!-- 搜索进度条 -->
      <div class="search-progress-container" id="search-progress-container" style="display: none;">
        <div class="search-progress-bar">
          <div class="search-progress-fill" id="search-progress-fill"></div>
        </div>
        <div class="search-progress-text" id="search-progress-text">搜索中...</div>
      </div>

      <!-- 消息列表 -->
      <div class="messages-container">
        <div class="messages-header">
          <h3>消息记录</h3>
          <button class="sort-btn" id="sort-btn" title="切换排序">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 5v14M5 12l7 7 7-7"/>
            </svg>
            <span id="sort-text">倒序</span>
          </button>
        </div>
        
        <div class="messages-list" id="messages-list">
          <!-- 消息项将在这里动态生成 -->
        </div>
        
        <!-- 空状态 -->
        <div class="empty-state" id="empty-state">
          <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="16" y1="13" x2="8" y2="13"/>
            <line x1="16" y1="17" x2="8" y2="17"/>
            <polyline points="10 9 9 9 8 9"/>
          </svg>
          <p>暂无聊天记录</p>
          <span>开始与AI助手对话，聊天记录将显示在这里</span>
        </div>
      </div>
    </div>
  </div>

  <!-- 确认对话框 -->
  <div class="modal-overlay" id="confirm-modal">
    <div class="modal-content">
      <h3 class="modal-title" id="modal-title">确认操作</h3>
      <p class="modal-message" id="modal-message">确定要执行此操作吗？</p>
      <div class="modal-actions">
        <button class="modal-btn secondary" id="modal-cancel">取消</button>
        <button class="modal-btn primary" id="modal-confirm">确认</button>
      </div>
    </div>
  </div>

  <!-- 全局加载遮罩 -->
  <div class="global-loading-overlay" id="global-loading-overlay">
    <div class="loading-spinner"></div>
    <div class="loading-text">正在生成长期记忆...</div>
  </div>

  <!-- 提示消息 -->
  <div class="toast" id="toast">
    <span id="toast-message"></span>
  </div>

  <!-- 引入 crypto-js 用于解密 -->
  <script src="./node_modules/crypto-js/crypto-js.js"></script>
  <script src="./js/chat-history.js"></script>
</body>
</html>
