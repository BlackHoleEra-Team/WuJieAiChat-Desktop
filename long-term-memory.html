<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>长期记忆管理</title>
  <link rel="stylesheet" href="css/long-term-memory.css">
</head>
<body>
  <div class="window-container">
    <!-- 标题栏 -->
    <div class="title-bar">
      <div class="title-bar-content">
        <div class="title-bar-left">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 2L2 7l10 5 10-5-10-5z"/>
            <path d="M2 17l10 5 10-5"/>
            <path d="M2 12l10 5 10-5"/>
          </svg>
          <span class="title-text">长期记忆管理</span>
        </div>
        <div class="title-bar-controls">
          <button class="title-bar-btn" id="minimizeBtn">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
          </button>
          <button class="title-bar-btn" id="closeBtn">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="18" y1="6" x2="6" y2="18"/>
              <line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </div>
      </div>
    </div>

    <!-- 联系人信息 -->
    <div class="contact-header">
      <div class="contact-info">
        <div class="contact-avatar">
          <img id="contact-avatar-img" src="images/app-icon.png" alt="头像">
        </div>
        <div class="contact-details">
          <h2 class="contact-name" id="contact-name">加载中...</h2>
          <p class="contact-stats" id="memory-count">共 0 条记忆</p>
        </div>
      </div>
    </div>

    <!-- 主内容区 -->
    <div class="main-content">
      <!-- 记忆列表 -->
      <div class="memory-list-container">
        <div class="memory-list" id="memory-list">
          <!-- 记忆项将在这里动态生成 -->
        </div>
        
        <!-- 空状态 -->
        <div class="empty-state" id="empty-state">
          <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M12 2L2 7l10 5 10-5-10-5z"/>
            <path d="M2 17l10 5 10-5"/>
            <path d="M2 12l10 5 10-5"/>
          </svg>
          <p>暂无长期记忆</p>
          <span>在聊天记录中选择消息并点击"加入长期记忆"来创建记忆</span>
        </div>
      </div>
    </div>
  </div>

  <!-- 记忆详情模态框 -->
  <div class="modal-overlay" id="memory-detail-modal">
    <div class="modal-content detail-modal">
      <div class="modal-header">
        <h3 class="modal-title">记忆详情</h3>
        <button class="modal-close" id="modal-close">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"/>
            <line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <div class="modal-body">
        <div class="detail-section">
          <h4>AI总结</h4>
          <div class="detail-content summary-content" id="detail-summary"></div>
        </div>
        <div class="detail-section">
          <h4>原始对话</h4>
          <div class="detail-content messages-content" id="detail-messages"></div>
        </div>
      </div>
      <div class="modal-actions">
        <button class="modal-btn secondary" id="detail-close-btn">关闭</button>
        <button class="modal-btn danger" id="detail-delete-btn">删除记忆</button>
      </div>
    </div>
  </div>

  <!-- 确认删除模态框 -->
  <div class="modal-overlay" id="confirm-modal">
    <div class="modal-content">
      <h3 class="modal-title">确认删除</h3>
      <p class="modal-message">确定要删除这条长期记忆吗？此操作不可恢复。</p>
      <div class="modal-actions">
        <button class="modal-btn secondary" id="confirm-cancel">取消</button>
        <button class="modal-btn danger" id="confirm-delete">删除</button>
      </div>
    </div>
  </div>

  <!-- Toast 提示 -->
  <div class="toast" id="toast">
    <span id="toast-message"></span>
  </div>

  <script src="js/long-term-memory.js"></script>
</body>
</html>
